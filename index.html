<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>YmoKart Business Manager</title>
<link rel="icon" type="image/svg+xml" href="assets/icons/app-icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ===== Header ===== -->
  <div class="header">
    <div class="header-row">
      <div class="brand">
        <div class="brand-logo">Y</div>
        <div class="brand-text">
          <h1>YmoKart</h1>
          <span>Business Manager</span>
        </div>
      </div>
      <a href="settings.html" class="header-icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019 9c.11.36.3.68.6.95.3.27.66.44 1.05.5H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
        </svg>
      </a>
    </div>
  </div>

  <div class="page">

    <!-- ===== Overview Stats ===== -->
    <div class="section-heading">
      <h2>Business Overview</h2>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        </div>
        <div class="stat-value" id="statTotalProducts">0</div>
        <div class="stat-label">Total Products</div>
      </div>
      <div class="stat-card">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
        </div>
        <div class="stat-value" id="statPosters">0</div>
        <div class="stat-label">Posters Made</div>
      </div>
      <div class="stat-card">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><path d="M14 2v6h6"></path></svg>
        </div>
        <div class="stat-value" id="statCatalog">0</div>
        <div class="stat-label">Catalogs Made</div>
      </div>
      <div class="stat-card">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="M18 17V9M13 17V5M8 17v-3"></path></svg>
        </div>
        <div class="stat-value" id="statReportsValue" style="font-size:17px;">₹0</div>
        <div class="stat-label">Stock MRP Value</div>
      </div>
    </div>

    <!-- ===== Quick Actions ===== -->
    <div class="section-heading">
      <h2>Quick Actions</h2>
    </div>
    <div class="quick-actions">
      <a href="products.html?new=1" class="quick-action">
        <div class="qa-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
        <span>Add Product</span>
      </a>
      <a href="poster.html" class="quick-action">
        <div class="qa-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
        </div>
        <span>Generate Poster</span>
      </a>
      <a href="catalog.html" class="quick-action">
        <div class="qa-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><path d="M14 2v6h6"></path></svg>
        </div>
        <span>PDF Catalog</span>
      </a>
      <a href="reports.html" class="quick-action">
        <div class="qa-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="M18 17V9M13 17V5M8 17v-3"></path></svg>
        </div>
        <span>View Reports</span>
      </a>
    </div>

    <!-- ===== Recent Products ===== -->
    <div class="section-heading">
      <h2>Recent Products</h2>
      <a href="products.html">See All</a>
    </div>
    <div id="recentProductsList" class="product-list"></div>

  </div>

  <!-- ===== FAB ===== -->
  <a href="products.html?new=1" class="fab" aria-label="Add Product">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </a>

  <!-- ===== Bottom Navigation ===== -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><path d="M9 22V12h6v10"></path></svg>
      <span>Home</span>
    </a>
    <a href="products.html" class="nav-item" data-page="products.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      <span>Products</span>
    </a>
    <a href="poster.html" class="nav-item" data-page="poster.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
      <span>Poster</span>
    </a>
    <a href="catalog.html" class="nav-item" data-page="catalog.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><path d="M14 2v6h6"></path></svg>
      <span>Catalog</span>
    </a>
    <a href="reports.html" class="nav-item" data-page="reports.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="M18 17V9M13 17V5M8 17v-3"></path></svg>
      <span>Reports</span>
    </a>
    <a href="settings.html" class="nav-item" data-page="settings.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019 9c.11.36.3.68.6.95.3.27.66.44 1.05.5H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
      <span>Settings</span>
    </a>
  </nav>

</div>

<script src="storage.js"></script>
<script src="app.js"></script>
</body>
</html>
