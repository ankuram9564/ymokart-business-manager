<script>
/* =========================================================
   Poster Studio — canvas based premium poster generator
   ========================================================= */

const productSelect = document.getElementById('productSelect');
const posterArea = document.getElementById('posterArea');
const noProductState = document.getElementById('noProductState');
const canvas = document.getElementById('posterCanvas');
const ctx = canvas.getContext('2d');
let posterProducts = [];

function loadProductOptions(){
  posterProducts = DB.getProducts();
  if(posterProducts.length === 0){
    noProductState.classList.remove('hidden');
    posterArea.classList.add('hidden');
    return;
  }
  productSelect.innerHTML = '<option value="">-- Choose a product --</option>' +
    posterProducts.map(p => `<option value="${p.id}">${escapeHTML(p.name)} (${escapeHTML(p.art || '-')})</option>`).join('');
}

function roundRect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function loadImage(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function drawPoster(product){
  const W = canvas.width, H = canvas.height;

  // Premium beige background with subtle gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#f7efe1');
  bgGrad.addColorStop(1, '#efe3cd');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Decorative orange corner accent
  ctx.fillStyle = '#ff7a00';
  roundRect(ctx, 0, 0, 220, 10, 5);
  ctx.fill();

  // Brand header
  ctx.fillStyle = '#1c1c1c';
  ctx.font = '700 34px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(product.brand || 'YmoKart', 50, 90);
  ctx.fillStyle = '#ff7a00';
  ctx.font = '600 20px Segoe UI, Arial, sans-serif';
  ctx.fillText('PREMIUM COLLECTION', 50, 122);

  // Product image card with soft shadow
  const cardX = 90, cardY = 170, cardW = W - 180, cardH = 460;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetY = 18;
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, cardX, cardY, cardW, cardH, 28);
  ctx.fill();
  ctx.restore();

  if(product.image){
    try{
      const img = await loadImage(product.image);
      const pad = 30;
      const boxW = cardW - pad * 2, boxH = cardH - pad * 2;
      const scale = Math.min(boxW / img.width, boxH / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      const dx = cardX + (cardW - dw) / 2;
      const dy = cardY + (cardH - dh) / 2;
      ctx.save();
      roundRect(ctx, cardX + 8, cardY + 8, cardW - 16, cardH - 16, 22);
      ctx.clip();
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.restore();
    }catch(e){
      ctx.fillStyle = '#999';
      ctx.font = '20px Segoe UI, Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Image not available', cardX + cardW / 2, cardY + cardH / 2);
      ctx.textAlign = 'left';
    }
  }

  // Product name
  ctx.fillStyle = '#1c1c1c';
  ctx.font = '700 30px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'left';
  wrapText(ctx, product.name || 'Product', 50, 690, W - 100, 36);

  // Detail chips row (ART / Color / Size)
  const chips = [
    { label: 'ART', value: product.art || '-' },
    { label: 'Color', value: product.color || '-' },
    { label: 'Size', value: product.size || '-' }
  ];
  let chipX = 50;
  const chipY = 730;
  chips.forEach(chip => {
    ctx.font = '600 16px Segoe UI, Arial, sans-serif';
    const label = `${chip.label}: `;
    const value = chip.value;
    const text = label + value;
    const textWidth = ctx.measureText(text).width + 40;
    ctx.fillStyle = 'rgba(28,28,28,0.06)';
    roundRect(ctx, chipX, chipY, textWidth, 44, 22);
    ctx.fill();
    ctx.fillStyle = '#1c1c1c';
    ctx.fillText(text, chipX + 20, chipY + 28);
    chipX += textWidth + 12;
  });

  // MRP price tag banner
  const bannerY = 820;
  ctx.fillStyle = '#ff7a00';
  roundRect(ctx, 50, bannerY, W - 100, 100, 22);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '600 20px Segoe UI, Arial, sans-serif';
  ctx.fillText('M.R.P.', 76, bannerY + 40);
  ctx.font = '800 44px Segoe UI, Arial, sans-serif';
  ctx.fillText(formatINR(product.mrp), 76, bannerY + 82);

  // Footer tagline
  ctx.fillStyle = '#7a6f5c';
  ctx.font = '500 16px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Powered by YmoKart Business Manager', W / 2, H - 30);
  ctx.textAlign = 'left';
}

function wrapText(c, text, x, y, maxWidth, lineHeight){
  const words = text.split(' ');
  let line = '';
  let curY = y;
  let lines = 0;
  for(let n = 0; n < words.length && lines < 2; n++){
    const testLine = line + words[n] + ' ';
    if(c.measureText(testLine).width > maxWidth && n > 0){
      c.fillText(line, x, curY);
      line = words[n] + ' ';
      curY += lineHeight;
      lines++;
    }else{
      line = testLine;
    }
  }
  c.fillText(line, x, curY);
}

async function generatePoster(){
  const id = productSelect.value;
  if(!id){
    showToast('Pehle product select karein', 'error');
    return;
  }
  const product = DB.getProductById(id);
  if(!product) return;
  await drawPoster(product);
  posterArea.classList.remove('hidden');
}

document.getElementById('generateBtn').addEventListener('click', generatePoster);
productSelect.addEventListener('change', generatePoster);

document.getElementById('downloadBtn').addEventListener('click', () => {
  const id = productSelect.value;
  if(!id){
    showToast('Pehle poster generate karein', 'error');
    return;
  }
  const product = DB.getProductById(id);
  const link = document.createElement('a');
  const safeName = (product?.name || 'poster').replace(/[^a-z0-9]/gi, '_').toLowerCase();
  link.download = `ymokart-poster-${safeName}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  DB.incrementStat('postersGenerated');
  showToast('Poster download ho gaya ✔');
});

loadProductOptions();
</script>
