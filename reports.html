<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reports</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#f5f5f5;
font-family:Arial,sans-serif;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h1{
margin-bottom:25px;
}

.value{
font-size:28px;
font-weight:bold;
color:#ff7a00;
}

.small{
color:#666;
margin-top:8px;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 Reports</h1>

<div class="card">
<div class="value" id="totalProducts">0</div>
<div class="small">Total Products</div>
</div>

<div class="card">
<div class="value" id="totalStock">0</div>
<div class="small">Total Stock</div>
</div>

<div class="card">
<div class="value" id="totalMRP">₹0</div>
<div class="small">Total MRP Value</div>
</div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[];

let stock=0;
let mrp=0;

products.forEach(function(p){

stock+=Number(p.stock||0);

mrp+=Number(p.mrp||0);

});

document.getElementById("totalProducts").innerHTML=products.length;
document.getElementById("totalStock").innerHTML=stock;
document.getElementById("totalMRP").innerHTML="₹"+mrp;

</script>

</body>
                                     </html>
