<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Catalog</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#f5f5f5;
font-family:Arial,sans-serif;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:20px;
}

button{
background:#ff7a00;
color:#fff;
border:none;
padding:15px 25px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.product{
background:#fff;
padding:15px;
margin-top:15px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}
</style>

</head>

<body>

<div class="container">

<h1>📄 PDF Catalog</h1>

<button onclick="alert('PDF Generator Coming Next Update')">
Generate PDF
</button>

<div id="products"></div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[];

let html="";

products.forEach(function(p){

html+=`
<div class="product">

<h2>${p.name||"Product"}</h2>

<p>Brand : ${p.brand||""}</p>

<p>Art : ${p.art||""}</p>

<p>MRP : ₹${p.mrp||0}</p>

</div>
`;

});

document.getElementById("products").innerHTML=html;

</script>

</body>
</html>
